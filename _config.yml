# Site-wide configuration

title: Chad Remesch
tagline: Entrepreneur, software engineer, dad of two, photographer
description: >-
  Chad Remesch — entrepreneur, software engineer, dad of two and photographer.
  Writing mostly about Ruby, concurrency and distributed systems.
locale: en_US
lang: en
url: https://remesch.com
baseurl: ""
timezone: America/New_York

# Build

permalink: /:year/:month/:day/:title/
markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

sass:
  sass_dir: _sass
  style: compressed

kramdown:
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6

feed:
  path: feed.xml

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

# Site owner

owner:
  name: Chad Remesch
  avatar: bio-photo.jpg
  bio: "Entrepreneur and software engineer. Dad of two wonderful kids. Photographer."
  email: chad@remesch.com
  github: chadrem
  linkedin: chadremesch
  instagram: chad_remesch

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - CLAUDE.md
  - vendor
  - .jekyll-cache
