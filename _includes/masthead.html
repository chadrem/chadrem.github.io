<header class="masthead">
  <div class="masthead__inner shell">
    <a class="masthead__brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>

    <nav class="nav" aria-label="Main">
      {%- for link in site.data.navigation %}
        {%- assign is_current = false -%}
        {%- if page.url contains link.url -%}{%- assign is_current = true -%}{%- endif -%}
        <a
          class="nav__link"
          href="{{ link.url | relative_url }}"
          {% if is_current %}aria-current="page"{% endif %}>{{ link.title }}</a>
      {%- endfor %}
    </nav>

    <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch to dark theme">
      {% include icon.html name="sun" class="theme-toggle__sun" %}
      {% include icon.html name="moon" class="theme-toggle__moon" %}
    </button>
  </div>
</header>
